name: Build macOS App

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  SPEC_FILE: jieqin_game_macos.spec
  APP_NAME: jieqin_game

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-13
            arch: x86_64
          - runs-on: macos-14
            arch: arm64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-macos-${{ matrix.runs-on }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-macos-${{ matrix.runs-on }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pyinstaller PyQt6 tinycc

      - name: Build with PyInstaller
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m PyInstaller "${{ env.SPEC_FILE }}" --noconfirm

      - name: Verify app bundle
        run: |
          APP="dist/${{ env.APP_NAME }}.app"
          if [ -d "$APP" ]; then
            echo "App bundle found:"
            ls -la "$APP"
            echo ""
            echo "Contents/Frameworks:"
            ls -la "$APP/Contents/Frameworks/" 2>/dev/null || echo "No Frameworks dir"
            echo ""
            echo "MacOS binary:"
            ls -la "$APP/Contents/MacOS/" 2>/dev/null || echo "No MacOS dir"
            SIZE=$(du -sh "$APP" | cut -f1)
            echo "App size: $SIZE"
          else
            echo "ERROR: App not found at $APP"
            ls -la dist/
            exit 1
          fi

      - name: Upload App artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-${{ matrix.arch }}
          path: dist/${{ env.APP_NAME }}.app
          retention-days: 30

  build-universal:
    needs: build-macos
    runs-on: macos-14
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create universal binary
        run: |
          INTEL_APP="artifacts/${{ env.APP_NAME }}-macos-x86_64/${{ env.APP_NAME }}.app"
          ARM_APP="artifacts/${{ env.APP_NAME }}-macos-arm64/${{ env.APP_NAME }}.app"
          UNIVERSAL_APP="dist/${{ env.APP_NAME }}-universal.app"

          mkdir -p dist

          if [ -f "$INTEL_APP/Contents/MacOS/${{ env.APP_NAME }}" ] && [ -f "$ARM_APP/Contents/MacOS/${{ env.APP_NAME }}" ]; then
            cp -r "$ARM_APP" "$UNIVERSAL_APP"
            lipo -create "$INTEL_APP/Contents/MacOS/${{ env.APP_NAME }}" "$ARM_APP/Contents/MacOS/${{ env.APP_NAME }}" -output "$UNIVERSAL_APP/Contents/MacOS/${{ env.APP_NAME }}"
            echo "Created universal binary: ${{ env.APP_NAME }}"
          else
            echo "Cannot create universal binary, copying ARM version"
            cp -r "$ARM_APP" "$UNIVERSAL_APP"
          fi

      - name: Upload universal App
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-universal
          path: dist/${{ env.APP_NAME }}-universal.app
          retention-days: 30

  release:
    needs: [build-macos, build-universal]
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp -r "artifacts/${{ env.APP_NAME }}-macos-x86_64/${{ env.APP_NAME }}.app" "release/${{ env.APP_NAME }}-macos-x86_64.app"
          cp -r "artifacts/${{ env.APP_NAME }}-macos-arm64/${{ env.APP_NAME }}.app" "release/${{ env.APP_NAME }}-macos-arm64.app"
          cp -r "artifacts/${{ env.APP_NAME }}-macos-universal/${{ env.APP_NAME }}-universal.app" "release/${{ env.APP_NAME }}-macos-universal.app"

          cd release
          zip -r "${{ env.APP_NAME }}-macos-x86_64.zip" "${{ env.APP_NAME }}-macos-x86_64.app"
          zip -r "${{ env.APP_NAME }}-macos-arm64.zip" "${{ env.APP_NAME }}-macos-arm64.app"
          zip -r "${{ env.APP_NAME }}-macos-universal.zip" "${{ env.APP_NAME }}-macos-universal.app"
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder "${{ env.APP_NAME }}-macos-arm64.app" -ov -format UDZO "${{ env.APP_NAME }}-macos-arm64.dmg"
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder "${{ env.APP_NAME }}-macos-universal.app" -ov -format UDZO "${{ env.APP_NAME }}-macos-universal.dmg"

          echo "Release files:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: ${{ env.APP_NAME }} ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/*.zip
            release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
